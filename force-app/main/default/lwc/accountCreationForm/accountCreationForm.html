<template>
    <lightning-card title="Create Account" icon-name="standard:account">
        <div class="slds-p-around_medium form-container">
            <template lwc:if={isLoading}>
                <lightning-spinner alternative-text="Saving..." size="medium"></lightning-spinner>
            </template>

            <div class="slds-form slds-form_stacked">

                <div class="slds-form-element slds-m-bottom_small">
                    <lightning-input
                        data-id="accountName"
                        type="text"
                        label="Account Name"
                        required
                        value={accountName}
                        onchange={handleNameChange}
                        onblur={validateName}
                        aria-required="true"
                    ></lightning-input>
                </div>

                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-input
                        data-id="phone"
                        type="tel"
                        label="Phone"
                        required
                        placeholder="10–15 digits"
                        value={phone}
                        onchange={handlePhoneChange}
                        onblur={validatePhone}
                        aria-required="true"
                    ></lightning-input>
                </div>

                <lightning-button
                    label="Save"
                    variant="brand"
                    disabled={isSaveDisabled}
                    onclick={handleSave}
                ></lightning-button>

            </div>
        </div>
    </lightning-card>
</template>
