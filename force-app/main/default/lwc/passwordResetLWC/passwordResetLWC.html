<template>
    <!-- Lightning Design System Modal Structure -->
    <div class="slds-modal__container">
        <!-- Modal Header -->
        <header class="slds-modal__header">
            <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Confirmation</h2>
        </header>

        <!-- Modal Body -->
        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
            <!-- Show spinner while the callout is happening -->
            <template if:true={isLoading}>
                <div class="slds-spinner_container">
                    <lightning-spinner alternative-text="Loading..." variant="brand" size="medium"></lightning-spinner>
                </div>
            </template>
            
            <!-- The confirmation message -->
            <p>Are you sure you want to send the reset password email to the contact?</p>
        </div>

        <!-- Modal Footer -->
        <footer class="slds-modal__footer">
            <!-- The 'disabled={isLoading}' attribute prevents double-clicks -->
            <button class="slds-button slds-button_neutral" onclick={handleCancel} disabled={isLoading}>No</button>
            <button class="slds-button slds-button_brand" onclick={handleConfirm} disabled={isLoading}>Yes</button>
        </footer>
    </div>
</template>
