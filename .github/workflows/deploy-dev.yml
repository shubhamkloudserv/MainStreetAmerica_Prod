name: Deploy to frver1 environment on push to msa_dev

on:
  push:
    branches:
      - msa_dev
    paths:
      - 'force-app/**'

jobs:
  Deploy-to-frver1-environment:
    runs-on: ubuntu-latest
    environment: frver1

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta
          sf plugins --core

      - name: Check SGD Commands
        run: |
          sf plugins
          sf commands | grep delta || true
          sf commands | grep sgd || true

      - name: Authenticate Org
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key

          sf org login jwt \
            --username "${{ secrets.DEPLOYMENT_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.CONSUMER_KEY }}" \
            --instance-url "${{ vars.INSTANCE_URL }}" \
            --set-default

      - name: Deploy Delta
        run: |
          sf project deploy start \
            --test-level RunLocalTests