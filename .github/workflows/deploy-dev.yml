name: Deploy Delta Changes to Sandbox

on:
  push:
    branches:
      - msa_dev # Triggers when code is merged into the develop branch

jobs:
  deploy-delta:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the source code with full git history
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Critical for git diff to compare commits properly

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Required for modern sf and SGD versions

      # Step 3: Install Salesforce CLI (sf v2)
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # Step 4: Install the sfdx-git-delta plugin
      - name: Install sfdx-git-delta Plugin
        run: |
          echo 'y' | sf plugins install sfdx-git-delta

      # Step 5: Authenticate to the target Sandbox
      - name: Authenticate to Salesforce Sandbox
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default --alias sandbox
          rm sfdx_auth.txt

      # Step 6: Generate the delta metadata package
      - name: Generate Delta Changes
        run: |
          mkdir changed-sources
          # Compares current commit (HEAD) against previous commit (HEAD~)
          sf sgd source delta --to "HEAD" --from "HEAD~1" --output changed-sources/

      # Step 7: Deploy delta changes if they exist
      - name: Deploy Delta to Sandbox
        run: |
          # Verify if package.xml contains actual metadata before deploying
          if [ -f changed-sources/package/package.xml ]; then
            sf project deploy start --manifest changed-sources/package/package.xml --target-org sandbox --wait 30
          else
            echo "No changed metadata detected to deploy."
          fi

      # Step 8: Deploy destructive changes (Deletions) if they exist
      - name: Deploy Destructive Changes
        run: |
          if [ -f changed-sources/destructiveChanges/destructiveChanges.xml ]; then
            sf project deploy start --metadata-dir changed-sources/destructiveChanges --target-org sandbox --wait 30
          else
            echo "No deleted metadata detected."
          fi
