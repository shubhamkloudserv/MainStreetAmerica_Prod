name: Deploy Delta Changes to Sandbox (Personal -> msa_dev)

on:
  push:
    branches:
      - msa_dev
    paths:
      - 'force-app/**' # Optimization: Only trigger if salesforce source files change

jobs:
  deploy-delta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for git-delta tracking history

      - name: Setup Node.js & Cache Dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up runners if package-lock exists

      # Pin versions for predictability across enterprise environments
      - name: Install Salesforce CLI & Plugins
        run: |
          npm install -g @salesforce/cli@2.38.0
          echo 'y' | sf plugins install sfdx-git-delta@latest

      - name: Authenticate to Salesforce Staging (JWT)
        shell: bash
        env:
          JWT_KEY: ${{ secrets.JWT_SERVER_KEY }}
          USERNAME: ${{ secrets.DEV_USERNAME }}
          CLIENT_ID: ${{ secrets.DEV_CONSUMER_KEY }}
          INSTANCE_URL: ${{ secrets.DEV_INSTANCE_URL || vars.DEV_INSTANCE_URL || 'https://test.salesforce.com' }}
        run: |
          set -euo pipefail

          # Defensive checks for missing pipeline dependencies
          if [ -z "$JWT_KEY" ] || [ -z "$USERNAME" ] || [ -z "$CLIENT_ID" ]; then
            echo "::error::Missing required Salesforce authentication secrets."
            exit 1
          fi

          # Securely write key without leaky echoes
          cat <<EOF > server.key
          $JWT_KEY
          EOF
          chmod 600 server.key

          sf org login jwt \
            --username "$USERNAME" \
            --jwt-key-file server.key \
            --client-id "$CLIENT_ID" \
            --instance-url "$INSTANCE_URL" \
            --set-default \
            --alias dev
          
          # Clean up key as soon as it's used
          rm -f server.key

      - name: Generate Delta Changes
        id: delta
        run: |
          mkdir -p changed-sources

          # Senior Fallback Logic: Handle fresh branches where github.event.before is 0000000000...
          FROM_COMMIT="${{ github.event.before }}"
          if [ "$FROM_COMMIT" = "0000000000000000000000000000000000000000" ] || [ -z "$FROM_COMMIT" ]; then
            FROM_COMMIT="HEAD~1"
          fi

          sf sgd source delta \
            --from "$FROM_COMMIT" \
            --to "${{ github.sha }}" \
            --output-dir changed-sources \
            --generate-delta \
            --source-dir force-app

      # VALIDATE ONLY step that outputs a Job ID for Quick Deploy
      - name: Validate Delta Deployment (Run Local Tests)
        id: validate
        run: |
          if [ -f changed-sources/package/package.xml ] && grep -q "<types>" changed-sources/package/package.xml; then
            echo "Changes detected. Validating deployment..."
            
            # Run validation and extract the job ID
            VALIDATION_RESULT=$(sf project deploy validate \
              --manifest changed-sources/package/package.xml \
              --target-org dev \
              --test-level RunRelevantTests \
              --wait 45 \
              --json)
            
            # Parse the Async Job ID using standard shell manipulation or jq if available
            JOB_ID=$(echo "$VALIDATION_RESULT" | jq -r '.result.id')
            echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changed metadata detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # QUICK DEPLOY step (Runs instantly without re-running tests)
      - name: Quick Deploy Delta to Staging
        if: steps.validate.outputs.has_changes == 'true'
        run: |
          sf project deploy quick \
            --job-id "${{ steps.validate.outputs.job_id }}" \
            --target-org dev \
            --wait 15

      # Destructive changes are handled separately as SGD creates an isolated structural artifact
      - name: Deploy Destructive Changes
        run: |
          if [ -f changed-sources/destructiveChanges/destructiveChanges.xml ] && grep -q "<types>" changed-sources/destructiveChanges/destructiveChanges.xml; then
            echo "Destructive changes detected. Deleting metadata..."
            sf project deploy start \
              --metadata-dir changed-sources/destructiveChanges \
              --target-org dev \
              --wait 30
          else
            echo "No deleted metadata detected."
          fi