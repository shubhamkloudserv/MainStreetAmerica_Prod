name: Deploy Delta Changes to Staging Sandbox

on:
  push:
    branches:
      - msa_staging

jobs:
  deploy-delta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta Plugin
        run: |
          echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to Salesforce Staging (JWT)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.JWT_SERVER_KEY }}" ]; then
            echo "ERROR: secrets.JWT_SERVER_KEY is not set" >&2
            exit 1
          fi

          if [ -z "${{ secrets.STAGING_USERNAME }}" ]; then
            echo "ERROR: secrets.STAGING_USERNAME is not set" >&2
            exit 1
          fi

          if [ -z "${{ secrets.STAGING_CONSUMER_KEY }}" ]; then
            echo "ERROR: secrets.STAGING_CONSUMER_KEY is not set" >&2
            exit 1
          fi

          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key

          if [ -n "${{ secrets.STAGING_INSTANCE_URL }}" ]; then
            INSTANCE_URL_VALUE="${{ secrets.STAGING_INSTANCE_URL }}"
          else
            INSTANCE_URL_VALUE="${{ vars.STAGING_INSTANCE_URL }}"
          fi

          sf org login jwt \
            --username "${{ secrets.STAGING_USERNAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.STAGING_CONSUMER_KEY }}" \
            --instance-url "${INSTANCE_URL_VALUE}" \
            --set-default \
            --alias staging

      - name: Generate Delta Changes
        run: |
          mkdir changed-sources

          sf sgd source delta \
            --from ${{ github.event.before }} \
            --to ${{ github.sha }} \
            --output-dir changed-sources \
            --generate-delta \
            --source-dir force-app

      - name: Deploy Delta to Staging
        run: |
          if grep -q "<types>" changed-sources/package/package.xml; then

            sf project deploy start \
              --manifest changed-sources/package/package.xml \
              --target-org staging \
              --test-level RunSpecifiedTests \
              --tests "${{ vars.STAGING_TEST_CLASSES }}" \
              --wait 30

          else
            echo "No changed metadata detected to deploy."
          fi

      - name: Deploy Destructive Changes
        run: |
          if [ -f changed-sources/destructiveChanges/destructiveChanges.xml ]; then

            sf project deploy start \
              --metadata-dir changed-sources/destructiveChanges \
              --target-org staging \
              --wait 30

          else
            echo "No deleted metadata detected."
          fi