name: validate production pull request

on:
  pull_request:
    branches: 
      - master
    paths:
      - 'force-app/**'

jobs:
  validate:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3
      - name: Validate on {{ vars.ENVIRONMENT_NAME }}
        uses: jawills/sf-deploy@v1.0
        with:
         SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
          DRY_RUN: true